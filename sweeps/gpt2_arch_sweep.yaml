program: scripts/train_gpt2.py
method: grid
metric:
  name: eval/loss
  goal: minimize
parameters:
  dataset-dir:
    value: data/processed/2021
  output-dir:
    value: outputs/gpt2-8192-sweep
  tokenizer-dir:
    value: tokenizer
  wandb-entity:
    value: a21-3jck-
  wandb-project:
    value: mahjongLM_gpt2
  wandb-mode:
    value: online
  arch:
    values: [A, B, C, D]
  n-positions:
    value: 1024
  max-seq-length:
    value: 8192
  max-tokens-per-batch:
    value: 65536
  eval-max-tokens-per-batch:
    value: 65536
  gradient-accumulation-steps:
    value: 1
  train-steps:
    value: 5000
  eval-interval:
    value: 1000
  save-interval:
    value: 1000
  log-interval:
    value: 50
  learning-rate:
    value: 0.0003
  weight-decay:
    value: 0.1
  warmup-steps:
    value: 100
  train-split-eval-ratio:
    value: 0.01
  seed:
    value: 42
  bf16:
    value: true
