name: Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    name: windows-latest / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: shogo82148/actions-setup-perl@v1

      - name: Install build tools
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel cmake ninja

      - name: Install pymahjong from source
        shell: bash
        run: |
          python -m pip install --force-reinstall git+https://github.com/MitsuhiroTaniguchi/pymahjong.git@main

      - name: Install MahjongLM test dependencies
        shell: bash
        run: |
          python -m pip install pytest requests tqdm tokenizers numpy protobuf

      - name: Verify scripts compile
        shell: bash
        run: |
          python -m py_compile scripts/tokenize_tenhou.py scripts/paifu_scraping/scraping.py

      - name: Run smoke tests
        shell: bash
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: src
        run: |
          python -m pytest -q \
            tests/test_package_init.py \
            tests/test_cli_smoke.py \
            tests/test_vocab_encoding.py
